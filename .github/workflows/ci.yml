name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: python -m pip install -e '.[dev]'
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest
      - name: Smoke test CLI
        run: outreach-bot init-db
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-${{ github.run_id }}
          path: |
            coverage.xml
            data/outreach.db
          if-no-files-found: warn
